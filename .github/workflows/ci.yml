name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies (CPU torch)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy matplotlib tqdm pytest ruff
      - name: Lint
        run: ruff check src analysis tests
      - name: Unit tests
        run: pytest
      - name: End-to-end smoke test (synthetic data, no download)
        run: python -m tests.smoke_test
