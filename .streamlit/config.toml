# shadcn/ui "zinc" dark palette - the base; finer styling is injected as CSS in dashboard/app.py.
[theme]
base = "dark"
primaryColor = "#fafafa"
backgroundColor = "#09090b"
secondaryBackgroundColor = "#18181b"
textColor = "#fafafa"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
